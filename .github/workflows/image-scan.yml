name: image-scan

on:
    workflow_call:

jobs:
    image-scanner:
        runs-on: ubuntu-latest
        steps:

            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Login To Dockerhub
              uses: docker/login-action@v4
              with:
                username: ${{vars.DOCKERHUB_USERNAME}}
                password: ${{secrets.DOCKERHUB_TOKEN}}

            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                image-ref: ${{vars.DOCKERHUB_USERNAME}}/frontend:${{ github.sha}}
                severity: 'CRITICAL'
                exit-code: '1'

            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                image-ref: ${{vars.DOCKERHUB_USERNAME}}/backend:${{ github.sha}}
                severity: 'CRITICAL'
                exit-code: '1'
              